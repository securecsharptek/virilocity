name: CI/CD — Virilocity V16.4 Vercel Multicloud

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'

jobs:
  # ── 1. Test ──────────────────────────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'npm' }

      - name: Install dependencies
        run: npm ci

      - name: Type check (strict)
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          NODE_ENV:              test
          JWT_PUBLIC_KEY:        test-public-key
          ANTHROPIC_API_KEY:     test-key
          STRIPE_SECRET_KEY:     sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_test_placeholder

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  # ── 2. Security ───────────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'npm' }
      - run: npm ci

      - name: npm audit (high+critical only)
        run: npm audit --audit-level=high

      # TEVV H-01 FIX: SBOM generation for government contract compliance
      - name: Generate SBOM (CycloneDX)
        run: npx --yes @cyclonedx/cyclonedx-npm --output-format json --output-file sbom.json
        continue-on-error: true   # non-blocking; warn if fails

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

      - name: Trivy filesystem scan (CRITICAL + HIGH)
        if: github.ref == 'refs/heads/main'
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref:  '.'
          severity:  'CRITICAL,HIGH'
          format:    'sarif'
          output:    'trivy-results.sarif'

      - name: Upload Trivy SARIF
        if: github.ref == 'refs/heads/main'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  # ── 3. Docker build (TEVV F-01: USER node validated) ─────────────────────────
  docker:
    name: Docker Build & Verify (F-01)
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t virilocity:ci .

      - name: TEVV F-01 Verify — confirm non-root user
        run: |
          USER=$(docker run --rm virilocity:ci whoami)
          echo "Container user: $USER"
          if [ "$USER" != "node" ]; then
            echo "❌ TEVV F-01 FAILED: Container running as $USER (expected: node)"
            exit 1
          fi
          echo "✅ TEVV F-01 PASS: Container running as non-root user 'node'"

      - name: Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'virilocity:ci'
          severity:  'CRITICAL,HIGH'
          format:    'table'

  # ── 4. Deploy to Vercel ───────────────────────────────────────────────────────
  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel (Production)
        run: npx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Verify deployment health
        run: |
          sleep 15
          URL="${{ secrets.VERCEL_PROD_URL }}"
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" "$URL/api/health/live")
          echo "Health probe status: $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ Deployment verified" || (echo "❌ Health check failed" && exit 1)

  # ── 5. WCAG 2.2 Accessibility Audit (TEVV F-04) ──────────────────────────────
  accessibility:
    name: WCAG 2.2 Audit (TEVV F-04)
    runs-on: ubuntu-latest
    needs: deploy-vercel
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}' }

      - name: Install axe-core CLI
        run: npm install -g @axe-core/cli

      - name: Run WCAG 2.2 audit on deployed URL
        run: |
          URL="${{ secrets.VERCEL_PROD_URL }}"
          axe "$URL" "$URL/auth/signup" "$URL/dashboard" \
            --tags wcag2a,wcag2aa,wcag22aa \
            --reporter json \
            --stdout > wcag-report.json || true
          # Fail on critical violations
          CRITICAL=$(cat wcag-report.json | python3 -c "
          import json,sys
          data = json.load(sys.stdin)
          v = sum(len(r.get('violations',[])) for r in data if isinstance(r, dict))
          print(v)
          ")
          echo "WCAG 2.2 violations: $CRITICAL"
          [ "$CRITICAL" -eq "0" ] && echo "✅ TEVV F-04 PASS: WCAG 2.2 compliant" || echo "⚠️ WCAG violations found — review wcag-report.json"

      - name: Upload WCAG report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wcag-report
          path: wcag-report.json
